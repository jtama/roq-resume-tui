name: Bug Report
description: Create a report to help us improve
title: '[BUG] '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        ### Need help?
        [Ask OpenCode to handle this issue](https://opencode.ai/s/new)
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: What is the bug?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: e.g. OS, Java version, Application version.
      placeholder: |
        - OS: [e.g. Linux]
        - Java version: [e.g. 25]
        - Application version: [e.g. 1.0.0]
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
